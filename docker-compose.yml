services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: sports_calendar
      POSTGRES_USER: sports_user
      POSTGRES_PASSWORD: sports_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports_user -d sports_calendar"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sports_calendar
      DB_USER: sports_user
      DB_PASSWORD: sports_pass
      FLASK_APP: app.py
      FLASK_DEBUG: 1
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
